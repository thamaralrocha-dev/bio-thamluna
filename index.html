<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Dashboard · @thamluna</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@300;400;500&family=Fraunces:ital,wght@1,300&display=swap" rel="stylesheet" />
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#FAFAF9; --bg-alt:#F4F2EE; --ink:#1A1A18; --ink-mid:#6B6B69;
  --ink-low:#AEAEAD; --sage:#8A9E8C; --sage-lt:#EEF2EE; --line:#E8E6E3;
  --white:#FFFFFF; --red:#E24B4A; --amber:#BA7517;
  --bg-pronto:#F4F9F4;
  --font-d:'Fraunces',serif; --font-s:'Cormorant Garamond',serif;
  --font-ui:'DM Sans',sans-serif; --r-xl:14px; --r-full:9999px; --trans:150ms ease;
}
html { scroll-behavior:smooth; }
body { font-family:var(--font-ui); background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; min-height:100dvh; padding-bottom:env(safe-area-inset-bottom); }

/* ── TOP BAR ── */
.top-bar { position:sticky; top:0; z-index:100; background:rgba(250,250,249,0.93); backdrop-filter:blur(12px); border-bottom:1px solid var(--line); padding:0 20px; }
.top-inner { max-width:1200px; margin:0 auto; height:50px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
.top-name { font-family:var(--font-d); font-size:18px; font-weight:300; font-style:italic; color:var(--sage); white-space:nowrap; }

/* ── MONTH NAV ── */
.month-nav { display:flex; gap:2px; }
.month-btn { font-family:var(--font-ui); font-size:12px; font-weight:500; padding:5px 12px; border:1px solid transparent; border-radius:var(--r-full); background:transparent; color:var(--ink-mid); cursor:pointer; transition:all var(--trans); white-space:nowrap; }
.month-btn:hover { color:var(--sage); }
.month-btn.active { color:var(--sage); background:var(--sage-lt); border-color:var(--sage-lt); }

/* ── SYNC DOT ── */
.sync-dot { width:7px; height:7px; border-radius:50%; background:#ccc; transition:background 0.4s; flex-shrink:0; }
.sync-dot.synced  { background:var(--sage); }
.sync-dot.syncing { background:#e8c97a; }
.sync-dot.error   { background:#c97a7a; }

/* ── LAYOUT ── */
.wrap { max-width:1200px; margin:0 auto; padding:32px 16px 80px; }
.page-intro { margin-bottom:28px; }
.page-eyebrow { font-size:10px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:var(--sage); display:block; margin-bottom:6px; }
.page-h1 { font-family:var(--font-s); font-size:30px; font-weight:300; color:var(--ink); line-height:1.2; }

/* ── SECTIONS ── */
.sec { margin-bottom:40px; }
.sec-head { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.sec-head h2 { font-size:10px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; color:var(--ink-low); white-space:nowrap; }
.sec-rule { flex:1; height:1px; background:var(--line); }
.sec-count { font-size:10px; font-weight:500; color:var(--sage); background:var(--sage-lt); padding:2px 8px; border-radius:var(--r-full); white-space:nowrap; }
.sec-count.all-done { background:#E8F2E8; color:#3A6A3A; }

/* ── FORMAT CHIPS ── */
.format-chips { display:flex; gap:5px; flex-wrap:wrap; }
.format-chip { font-size:9px; font-weight:500; letter-spacing:0.1em; padding:2px 8px; border-radius:var(--r-full); background:var(--bg-alt); color:var(--ink-mid); white-space:nowrap; }

/* ── IDEIAS BTN (top-bar) ── */
.ideias-btn { font-family:var(--font-ui); font-size:12px; font-weight:500; padding:5px 12px; border:1px solid transparent; border-radius:var(--r-full); background:transparent; color:var(--ink-mid); cursor:pointer; transition:all var(--trans); white-space:nowrap; display:flex; align-items:center; gap:5px; }
.ideias-btn:hover { color:var(--sage); }
.ideias-btn.active { color:var(--sage); background:var(--sage-lt); border-color:var(--sage-lt); }

/* ── IDEIAS VIEW ── */
#ideiasView { display:none; }
#ideiasView.visible { display:block; }
#dashboardView { display:block; }
#dashboardView.hidden { display:none; }
.ideias-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; gap:12px; }
.ideias-title { font-family:var(--font-s); font-size:28px; font-weight:300; font-style:italic; color:var(--ink); }
.btn-nova-ideia { font-family:var(--font-ui); font-size:12px; font-weight:500; padding:8px 16px; border:none; border-radius:var(--r-full); background:var(--sage); color:#fff; cursor:pointer; transition:opacity var(--trans); white-space:nowrap; }
.btn-nova-ideia:hover { opacity:0.85; }
.ideias-filters { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:24px; }
.ideia-filter-btn { font-family:var(--font-ui); font-size:11px; font-weight:500; padding:5px 14px; border:1px solid var(--line); border-radius:var(--r-full); background:var(--bg); color:var(--ink-mid); cursor:pointer; transition:all var(--trans); }
.ideia-filter-btn:hover { border-color:var(--sage); color:var(--sage); }
.ideia-filter-btn.active { background:var(--sage); border-color:var(--sage); color:#fff; }
.ideias-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
.ideia-card { background:var(--white); border:1px solid var(--line); border-radius:var(--r-xl); padding:16px 18px; display:flex; flex-direction:column; gap:10px; transition:box-shadow var(--trans); }
.ideia-card:hover { box-shadow:0 2px 12px rgba(0,0,0,0.06); }
.ideia-card-top { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.ideia-format-badge { font-size:9px; font-weight:600; letter-spacing:0.13em; text-transform:uppercase; padding:3px 9px; border-radius:var(--r-full); }
.ideia-format-badge.fmt-reel      { background:#F0EEFF; color:#7B5CE5; }
.ideia-format-badge.fmt-carrossel { background:#FFF3E8; color:#C4692A; }
.ideia-format-badge.fmt-estatico  { background:#E8F0FF; color:#3360C4; }
.ideia-format-badge.fmt-storie    { background:#FFF0F5; color:#C4338A; }
.ideia-date { font-size:10px; color:var(--ink-low); font-weight:400; }
.ideia-titulo { font-family:var(--font-s); font-size:17px; font-weight:300; font-style:italic; color:var(--ink); line-height:1.35; }
.ideia-descricao { font-size:12px; color:var(--ink-mid); line-height:1.55; }
.ideia-card-actions { display:flex; align-items:center; justify-content:space-between; margin-top:4px; gap:8px; }
.btn-transformar { font-family:var(--font-ui); font-size:11px; font-weight:500; padding:6px 12px; border:1px solid var(--sage); border-radius:var(--r-full); background:transparent; color:var(--sage); cursor:pointer; transition:all var(--trans); }
.btn-transformar:hover { background:var(--sage); color:#fff; }
.btn-apagar-ideia { font-family:var(--font-ui); font-size:10px; color:var(--ink-low); background:none; border:none; cursor:pointer; padding:4px 6px; transition:color var(--trans); }
.btn-apagar-ideia:hover { color:var(--red); }
.ideias-empty { text-align:center; padding:60px 20px; font-family:var(--font-s); font-size:18px; font-style:italic; color:var(--ink-low); grid-column:1/-1; }

/* ── MODAL NOVA IDEIA ── */
.modal-nova-ideia .modal-body { gap:16px; }

/* ── MODAL TRANSFORMAR ── */
.transformar-modal { max-width:340px; }
.transformar-modal .modal-body { gap:16px; align-items:stretch; }
.transformar-modal .btn-transformar-confirm { font-family:var(--font-ui); font-size:13px; font-weight:500; padding:11px; border:none; border-radius:10px; background:var(--sage); color:#fff; cursor:pointer; transition:opacity var(--trans); width:100%; }
.transformar-modal .btn-transformar-confirm:hover { opacity:0.85; }
.transformar-modal .btn-sem-data { font-family:var(--font-ui); font-size:12px; color:var(--sage); background:none; border:none; cursor:pointer; text-align:center; padding:6px; transition:opacity var(--trans); }
.transformar-modal .btn-sem-data:hover { opacity:0.7; }

/* ── COLLAPSE ── */
.sec-head--toggle { cursor:pointer; -webkit-tap-highlight-color:transparent; user-select:none; }
.sec-head--toggle:hover h2 { color:var(--sage); }
.toggle-btn { width:22px; height:22px; border:1.5px solid var(--line); border-radius:50%; background:var(--white); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; color:var(--ink-low); padding:0; transition:border-color var(--trans),color var(--trans); }
.sec-head--toggle:hover .toggle-btn { border-color:var(--sage); color:var(--sage); }
.toggle-btn .icon-v { transition:opacity 0.25s ease; }
.toggle-btn.open .icon-v { opacity:0; }
.collapsible-body { overflow:hidden; max-height:6000px; transition:max-height 0.38s ease; }
.collapsible-body.collapsed { max-height:0; }

/* ── KANBAN ── */
.kanban-cols { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; align-items:start; overflow-x:auto; padding-bottom:4px; }
@media (max-width:900px) {
  .kanban-cols { display:flex; overflow-x:auto; gap:10px; padding-bottom:10px; -webkit-overflow-scrolling:touch; scroll-snap-type:x mandatory; }
  .kanban-col  { min-width:200px; flex-shrink:0; scroll-snap-align:start; }
}
.kanban-col { display:flex; flex-direction:column; min-width:0; }
.kanban-col-header { display:flex; align-items:center; justify-content:space-between; padding:8px 10px; background:var(--bg-alt); border:1px solid var(--line); border-bottom:none; border-radius:var(--r-xl) var(--r-xl) 0 0; }
.kanban-col-name { font-size:9px; font-weight:500; letter-spacing:0.16em; text-transform:uppercase; color:var(--ink-mid); }
.kanban-col-count { font-size:11px; font-weight:500; color:var(--sage); background:var(--sage-lt); min-width:20px; height:20px; padding:0 6px; border-radius:var(--r-full); display:flex; align-items:center; justify-content:center; }
.kanban-col-body { display:flex; flex-direction:column; gap:7px; padding:8px 7px; background:var(--bg-alt); border-left:1px solid var(--line); border-right:1px solid var(--line); min-height:60px; }
.kanban-col-footer { background:var(--bg-alt); border:1px solid var(--line); border-top:none; border-radius:0 0 var(--r-xl) var(--r-xl); padding:7px; }

/* ── KANBAN CARDS ── */
.k-card { background:var(--white); border:1px solid var(--line); border-radius:10px; padding:11px 11px 8px; cursor:pointer; transition:border-color var(--trans),opacity var(--trans),transform var(--trans); -webkit-tap-highlight-color:transparent; user-select:none; }
.k-card:hover { border-color:var(--sage); }
.k-card:active { transform:scale(0.998); }
.k-card.urg-overdue  { border-left:3px solid var(--red); background:#FFF5F5; }
.k-card.urg-overdue:hover { border-color:var(--red); }
.k-card.urg-today    { border-left:3px solid var(--red); }
.k-card.urg-tomorrow { border-left:3px solid var(--amber); }
.k-card.urg-week     { border-left:3px solid #8A9E8C; }
.k-card.k-col-programado { background:var(--bg-pronto); }
.k-card.is-advancing { opacity:0; transform:scale(0.95) translateY(-4px); }
.k-card-top { display:flex; align-items:center; gap:6px; margin-bottom:5px; flex-wrap:wrap; }
.k-type-lbl { font-size:8px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-low); }

/* ── EDITABLE TITLE ── */
.k-card-title { font-family:var(--font-s); font-size:13px; font-weight:300; font-style:italic; color:var(--ink); line-height:1.4; margin-bottom:5px; cursor:text; border-radius:4px; padding:1px 2px; margin-left:-2px; transition:background var(--trans); }
.k-card-title:hover { background:var(--bg-alt); }
.k-title-input { font-family:var(--font-s); font-size:13px; font-weight:300; font-style:italic; color:var(--ink); border:none; border-bottom:1.5px solid var(--sage); background:transparent; outline:none; width:100%; padding:1px 0; line-height:1.4; display:block; margin-bottom:5px; }

/* ── CARD DATE ── */
.k-card-date { font-size:9px; color:var(--ink-low); margin-bottom:8px; display:flex; align-items:center; gap:2px; }

/* ── URGENCY BADGE ── */
.urg-badge { font-size:8px; font-weight:500; padding:2px 6px; border-radius:var(--r-full); letter-spacing:0.06em; }
.urg-badge.urg-overdue  { background:#FEE8E8; color:var(--red); }
.urg-badge.urg-today    { background:#FEE8E8; color:var(--red); }
.urg-badge.urg-tomorrow { background:#FEF3E0; color:var(--amber); }
.urg-badge.urg-week     { background:var(--sage-lt); color:var(--sage); }

/* ── ADVANCE BUTTON ── */
.k-advance-btn { display:block; width:100%; margin-top:8px; font-family:var(--font-ui); font-size:10px; font-weight:500; padding:6px 8px; border:1px solid var(--line); border-radius:7px; background:var(--bg); color:var(--ink-mid); cursor:pointer; transition:all var(--trans); text-align:left; letter-spacing:0.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.k-advance-btn:hover { border-color:var(--sage); color:var(--sage); background:var(--sage-lt); }
.k-advance-btn.k-advance-post { color:var(--sage); border-color:var(--sage); }
.k-advance-btn.k-advance-post:hover { background:var(--sage); color:var(--white); }
.k-back-btn { display:block; width:100%; margin-top:4px; font-family:var(--font-ui); font-size:9px; padding:4px 8px; border:none; border-radius:6px; background:transparent; color:var(--ink-low); cursor:pointer; transition:color var(--trans),background var(--trans); text-align:left; letter-spacing:0.02em; }
.k-back-btn:hover { color:var(--red); background:#FEF0F0; }

/* ── DELETE BUTTON ── */
.k-delete-btn { position:absolute; top:7px; right:7px; width:20px; height:20px; border:none; border-radius:50%; background:transparent; color:var(--ink-low); cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity var(--trans),background var(--trans),color var(--trans); flex-shrink:0; padding:0; }
.k-card:hover .k-delete-btn { opacity:1; }
.k-delete-btn:hover { background:#FEE8E8; color:var(--red); }

/* ── TOAST ── */
.toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(16px); z-index:300; background:var(--ink); color:var(--white); font-family:var(--font-ui); font-size:12px; font-weight:400; padding:10px 16px; border-radius:var(--r-full); display:flex; align-items:center; gap:12px; opacity:0; pointer-events:none; transition:opacity 200ms ease, transform 200ms ease; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }
.toast-undo { background:none; border:none; color:#8EB88E; font-family:var(--font-ui); font-size:12px; font-weight:600; cursor:pointer; padding:0; letter-spacing:0.04em; }
.toast-undo:hover { color:#afd6af; }

/* ── EDIT DATE BUTTON ── */
.edit-date-btn { opacity:0; background:none; border:none; cursor:pointer; color:var(--ink-low); padding:1px 3px; border-radius:4px; transition:opacity var(--trans),color var(--trans),background var(--trans); line-height:1; vertical-align:middle; margin-left:3px; display:inline-flex; align-items:center; flex-shrink:0; }
.k-card:hover .edit-date-btn { opacity:1; }
.edit-date-btn:hover { color:var(--sage); background:var(--sage-lt); }

/* ── INLINE ADD FORM ── */
.kanban-add-trigger { width:100%; font-family:var(--font-ui); font-size:10px; font-weight:500; letter-spacing:0.08em; padding:6px; border:1px dashed var(--line); border-radius:8px; background:transparent; color:var(--ink-low); cursor:pointer; transition:all var(--trans); }
.kanban-add-trigger:hover { border-color:var(--sage); color:var(--sage); }
.k-inline-form { display:none; flex-direction:column; gap:5px; padding-top:7px; }
.k-inline-form.open { display:flex; }
.k-add-input, .k-add-select { font-family:var(--font-ui); font-size:12px; border:1px solid var(--line); border-radius:8px; padding:6px 9px; background:var(--white); color:var(--ink); outline:none; width:100%; transition:border-color var(--trans); }
.k-add-input:focus, .k-add-select:focus { border-color:var(--sage); }
.k-add-select { appearance:none; cursor:pointer; }
.k-add-actions { display:flex; gap:5px; }
.k-add-cancel { flex:1; font-family:var(--font-ui); font-size:11px; padding:6px; border:1px solid var(--line); border-radius:7px; background:transparent; color:var(--ink-mid); cursor:pointer; transition:border-color var(--trans); }
.k-add-cancel:hover { border-color:var(--ink-low); }
.k-add-save { flex:1.5; font-family:var(--font-ui); font-size:11px; font-weight:500; padding:6px; border:none; border-radius:7px; background:var(--sage); color:var(--white); cursor:pointer; transition:opacity var(--trans); }
.k-add-save:hover { opacity:0.88; }

/* ── STEP BUBBLES (modal only, read-only) ── */
.steps-bar.modal-steps { padding-top:0; }
.steps-track { display:flex; align-items:flex-start; width:100%; }
.step-item { display:flex; flex-direction:column; align-items:center; gap:4px; flex-shrink:0; padding:3px 4px; border-radius:6px; }
.step-dot { width:14px; height:14px; border-radius:50%; border:1.5px solid var(--line); background:var(--white); flex-shrink:0; }
.step-item.done .step-dot { background:var(--sage); border-color:var(--sage); }
.step-item.current .step-dot { border-color:var(--sage); border-width:2px; }
.step-lbl { font-size:7.5px; font-weight:500; letter-spacing:0.05em; text-transform:uppercase; color:var(--ink-low); white-space:nowrap; }
.step-item.done .step-lbl { color:var(--sage); }
.step-item.current .step-lbl { color:var(--sage); }
.step-line { flex:1; height:1.5px; background:var(--line); margin-top:10px; min-width:4px; }
.step-line.done { background:var(--sage); }
@media (max-width:380px) { .step-lbl { display:none; } .step-item { padding:3px 2px; } }

/* ── HISTORY ── */
.history-card { background:var(--white); border:1px solid var(--line); border-radius:var(--r-xl); overflow:hidden; }
.history-header { padding:16px 20px 14px; border-bottom:1px solid var(--line); }
.history-title-row { display:flex; align-items:baseline; gap:12px; margin-bottom:8px; }
.history-month { font-family:var(--font-s); font-size:20px; font-weight:300; font-style:italic; color:var(--ink); }
.history-count { font-size:10px; font-weight:500; letter-spacing:0.1em; color:var(--ink-low); }
.history-pills { display:flex; gap:6px; flex-wrap:wrap; }
.hist-pill { font-size:9px; font-weight:500; letter-spacing:0.1em; padding:3px 10px; border-radius:var(--r-full); background:var(--sage-lt); color:var(--sage); }
.history-items { padding:4px 0; }
.hist-item { display:flex; align-items:flex-start; gap:12px; padding:12px 20px; border-bottom:1px solid var(--line); transition:background var(--trans); }
.hist-item:last-child { border-bottom:none; }
.hist-item:hover { background:var(--bg); }
.hist-check { font-size:13px; color:var(--sage); flex-shrink:0; margin-top:1px; }
.hist-content { flex:1; min-width:0; }
.hist-meta { font-size:9px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-low); display:block; margin-bottom:2px; }
.hist-title { font-family:var(--font-s); font-size:14px; font-weight:300; font-style:italic; color:var(--ink); line-height:1.35; }
.hist-drive { font-size:11px; font-weight:500; color:var(--sage); text-decoration:none; white-space:nowrap; flex-shrink:0; transition:opacity var(--trans); align-self:center; }
.hist-drive:hover { opacity:0.7; text-decoration:underline; }
.hist-empty { padding:24px 20px; font-size:13px; color:var(--ink-low); font-family:var(--font-s); font-style:italic; }

/* ── MODAL ── */
.modal-overlay { position:fixed; inset:0; z-index:200; background:rgba(26,26,24,0.45); backdrop-filter:blur(4px); display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity 220ms ease; }
.modal-overlay.open { opacity:1; pointer-events:auto; }
@media (min-width:600px) { .modal-overlay { align-items:center; } }
.modal { background:var(--white); border-radius:var(--r-xl) var(--r-xl) 0 0; width:100%; max-width:560px; max-height:92dvh; display:flex; flex-direction:column; overflow:hidden; transform:translateY(24px); transition:transform 260ms cubic-bezier(.22,1,.36,1); }
.modal-overlay.open .modal { transform:translateY(0); }
@media (min-width:600px) { .modal { border-radius:var(--r-xl); max-height:88dvh; } }
.modal-header { padding:20px 20px 16px; border-bottom:1px solid var(--line); position:relative; flex-shrink:0; }
.modal-eyebrow { font-size:10px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:var(--sage); display:block; margin-bottom:4px; }
.modal-title { font-family:var(--font-s); font-size:18px; font-weight:300; font-style:italic; color:var(--ink); line-height:1.35; padding-right:32px; }
.modal-close { position:absolute; top:18px; right:18px; width:30px; height:30px; border:none; background:var(--bg-alt); border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--ink-mid); transition:background var(--trans); }
.modal-close:hover { background:var(--line); }
.modal-body { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:24px; -webkit-overflow-scrolling:touch; }

// ── Posts dinâmicos ───────────────────────────────────────────────────────────

function getDynamicPosts() {
  return Array.isArray(state._dynamic_posts) ? state._dynamic_posts : [];
}

function getAllPosts() {
  const all = [];
  PLAN_ITEMS.forEach(p => {
    const effectiveDate = getItem(p.id).post_date || p.date;
    all.push({ ...p, date: effectiveDate });
  });
  getDynamicPosts().forEach(p => {
    const effectiveDate = getItem(p.id).post_date || p.date;
    all.push({ ...p, date: effectiveDate });
  });
  return all;

// ── Supabase ──────────────────────────────────────────────────────────────────

async function api(method, body) {
  const url = `${SUPABASE_URL}/rest/v1/${TABLE}`;
  const headers = {
    'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Prefer': method === 'POST' ? 'resolution=merge-duplicates,return=minimal' : 'return=minimal',
  };
  const res = await fetch(
    method === 'GET' ? url + '?key=eq.' + ROW_KEY + '&select=value' : url,
    { method, headers, body: body ? JSON.stringify(body) : undefined }
  );
  if (method === 'GET') {
    const rows = await res.json();
    return rows.length ? JSON.parse(rows[0].value) : {};
  }
}

// ── Helpers de estado ─────────────────────────────────────────────────────────

function getItem(id) {
  if (!state[id] || typeof state[id] !== 'object') {
    state[id] = { is_scheduled:false, is_posted:false, posted_at:null, post_date:null,
                  drive_link:'', legenda:'', steps:{}, custom_title:'' };
  }
  return state[id];
}

function getEffectiveTitle(id, defaultTitle) {
  return getItem(id).custom_title || defaultTitle;
}

function migrate() {
  Object.keys(state).forEach(k => {
    if (k === '_dynamic_posts') return;
    const v = state[k];
    if (typeof v === 'boolean') {
      state[k] = { is_scheduled:v, is_posted:v, posted_at:null, post_date:null,
                   drive_link:'', legenda:'', steps:{}, custom_title:'' };
    } else if (typeof v === 'object') {
      if (!('steps'        in v)) v.steps        = {};
      if (!('drive_link'   in v)) v.drive_link   = '';
      if (!('legenda'      in v)) v.legenda       = '';
      if (!('custom_title' in v)) v.custom_title  = '';
      if (!('is_scheduled' in v)) v.is_scheduled  = v.done || false;
      if (!('is_posted'    in v)) v.is_posted     = v.done || false;
      if (!('posted_at'    in v)) v.posted_at     = null;
      if (!('post_date'    in v)) v.post_date     = null;
    }
  });
  if (!Array.isArray(state._dynamic_posts)) state._dynamic_posts = [];
}

// ── Load / Save ───────────────────────────────────────────────────────────────

async function loadState() {
  setDot('syncing');
  try { state = await api('GET'); migrate(); applyAll(); setDot('synced'); }
  catch(e) { setDot('error'); }
}

async function saveState() {
  if (saving) { pendingSave = true; return; }
  saving = true; setDot('syncing');
  try {
    await api('POST', { key:ROW_KEY, value:JSON.stringify(state), updated_at:new Date().toISOString() });
    setDot('synced');
  } catch(e) { setDot('error'); }
  saving = false;
  if (pendingSave) { pendingSave = false; saveState(); }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 800);
}

// ── Coluna (5 colunas) ────────────────────────────────────────────────────────

function getColuna5(id, type) {
  const item = getItem(id);
  if (item.deleted)      return null;        // excluído
  if (item.is_posted)    return null;        // → histórico
  if (item.is_scheduled) return 'programado';
  const s = item.steps || {};
  if (type === 'reel') {
    if (!s.roteiro)              return 'criacao';
    if (!s.gravacao || !s.edicao) return 'producao';
    if (!s.legenda)              return 'legenda';
    if (!s.revisao)              return 'revisao';
    return 'programado';
  } else if (type === 'storie') {
    if (!s.roteiro)   return 'criacao';
    if (!s.gravacao)  return 'producao';
    if (!s.legenda)   return 'legenda';
    if (!s.revisao)   return 'revisao';
    return 'programado';
  } else {
    if (!s.texto)  return 'criacao';
    if (!s.design) return 'producao';
    if (!s.legenda) return 'legenda';
    if (!s.revisao) return 'revisao';
    return 'programado';
  }
}

function getNextColLabel(col) {
  return { criacao:'Produção', producao:'Legenda', legenda:'Revisão',
           revisao:'Programado', programado:'Postado' }[col] || '';
}

// ── Avançar card ──────────────────────────────────────────────────────────────

function advanceCard(id, type, defaultTitle) {
  const item  = getItem(id);
  if (!item.steps) item.steps = {};
  const col = getColuna5(id, type);
  if (!col) return;

  if (col === 'programado') {
    // Marcar como postado → vai pro histórico
    markPostedById(id, type);
    return;
  }

  if (col === 'criacao') {
    if (type === 'reel' || type === 'storie') item.steps.roteiro = true;
    else { item.steps.texto = true; }
  } else if (col === 'producao') {
    if (type === 'reel') { item.steps.gravacao = true; item.steps.edicao = true; }
    else if (type === 'storie') { item.steps.gravacao = true; }
    else { item.steps.design = true; }
  } else if (col === 'legenda') {
    item.steps.legenda = true;
  } else if (col === 'revisao') {
    item.steps.revisao = true;
    item.steps.pronto  = true;
    item.is_scheduled  = true;
  }

  // Animar saída do card, depois re-renderizar
  const cardEl = document.querySelector(`[data-card-id="${id}"]`);
  if (cardEl) {
    cardEl.classList.add('is-advancing');
    setTimeout(() => { renderKanban(); renderPlan(); scheduleSave(); }, 180);
  } else {
    renderKanban(); renderPlan(); scheduleSave();
  }
}

// ── Excluir / desfazer ────────────────────────────────────────────────────────

let _lastDeleted = null;
let _toastTimer  = null;

function deleteCard(id) {
  // Guardar snapshot para desfazer
  const dynPost = getDynamicPosts().find(p => p.id === id);
  _lastDeleted = { id, snapshot: JSON.parse(JSON.stringify(getItem(id))), dynPost: dynPost || null };

  getItem(id).deleted = true;

  const cardEl = document.querySelector(`[data-card-id="${id}"]`);
  if (cardEl) {
    cardEl.classList.add('is-advancing');
    setTimeout(() => { renderKanban(); renderPlan(); scheduleSave(); }, 180);
  } else {
    renderKanban(); renderPlan(); scheduleSave();
  }
  showToast();
}

function undoDelete() {
  if (!_lastDeleted) return;
  const { id, snapshot, dynPost } = _lastDeleted;
  state[id] = snapshot;
  // Se era post dinâmico e foi removido da lista, re-adicionar
  if (dynPost && !getDynamicPosts().find(p => p.id === id)) {
    if (!Array.isArray(state._dynamic_posts)) state._dynamic_posts = [];
    state._dynamic_posts.push(dynPost);
  }
  _lastDeleted = null;
  hideToast();
  renderKanban(); renderPlan(); renderHistory(); scheduleSave();
}

function showToast() {
  clearTimeout(_toastTimer);
  document.getElementById('toast').classList.add('show');
  _toastTimer = setTimeout(() => { hideToast(); _lastDeleted = null; }, 5000);
}

function hideToast() {
  clearTimeout(_toastTimer);
  document.getElementById('toast').classList.remove('show');
}

function regressCard(id, type) {
  const item = getItem(id);
  if (!item.steps) item.steps = {};
  const col = getColuna5(id, type);
  if (!col || col === 'criacao') return;

  if (col === 'programado') {
    item.is_scheduled    = false;
    item.steps.pronto    = false;
    item.steps.revisao   = false;
  } else if (col === 'revisao') {
    item.steps.legenda = false;
  } else if (col === 'legenda') {
    if (type === 'reel') { item.steps.gravacao = false; item.steps.edicao = false; }
    else if (type === 'storie') { item.steps.gravacao = false; }
    else { item.steps.design = false; }
  } else if (col === 'producao') {
    if (type === 'reel' || type === 'storie') item.steps.roteiro = false;
    else { item.steps.texto = false; }
  }

  const cardEl = document.querySelector(`[data-card-id="${id}"]`);
  if (cardEl) {
    cardEl.classList.add('is-advancing');
    setTimeout(() => { renderKanban(); renderPlan(); scheduleSave(); }, 180);
  } else {
    renderKanban(); renderPlan(); scheduleSave();
  }
}

function markPostedById(id, type) {
  const item = getItem(id);
  if (item.is_posted) return;
  item.is_posted = item.is_scheduled = true;
  item.posted_at = new Date().toISOString();
  const allData = [...PLAN_ITEMS, ...getDynamicPosts()].find(x => x.id === id);
  if (allData) {
    const defs = STEP_DEFS[allData.type] || STEP_DEFS.reel;
    if (!item.steps) item.steps = {};
    defs.forEach(([key]) => { item.steps[key] = true; });
  }
  // Se modal aberto para este item, fechar
  if (activeId === id) setTimeout(closePanel, 380);
  renderKanban(); renderHistory(); renderPlan();
  saveState();
}

// ── Edição inline de título ───────────────────────────────────────────────────

function startTitleEdit(event, id, defaultTitle) {
  event.stopPropagation();
  const titleEl = document.getElementById('k-title-' + id);
  if (!titleEl || titleEl.querySelector('input')) return;

  const current = titleEl.textContent;
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'k-title-input';
  input.value = current;
  input.onclick = e => e.stopPropagation();

  const commit = () => {
    const val = input.value.trim();
    if (val && val !== defaultTitle) getItem(id).custom_title = val;
    else if (val === defaultTitle)   getItem(id).custom_title = '';
    if (val) {
      titleEl.textContent = val;
      scheduleSave();
      renderPlan();
    } else {
      titleEl.textContent = current;
    }
  };

  input.addEventListener('blur',    commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { titleEl.textContent = current; }
  });

  titleEl.innerHTML = '';
  titleEl.appendChild(input);
  setTimeout(() => { input.focus(); input.select(); }, 10);
}

// ── Steps (read-only no modal) ────────────────────────────────────────────────

function renderStepsBar(container) {
  const id   = container.dataset.stepsId;
  const type = container.dataset.type;
  if (!id || !type) return;
  const defs      = STEP_DEFS[type] || STEP_DEFS.reel;
  const itemSteps = getItem(id).steps || {};
  let firstUndone = defs.length;
  for (let i = 0; i < defs.length; i++) {
    if (!itemSteps[defs[i][0]]) { firstUndone = i; break; }
  }
  let html = '<div class="steps-track">';
  defs.forEach(([key, label], i) => {
    const done    = !!itemSteps[key];
    const current = i === firstUndone;
    const cls = done ? 'step-item done' : current ? 'step-item current' : 'step-item';
    html += `<div class="${cls}"><div class="step-dot"></div><span class="step-lbl">${label}</span></div>`;
    if (i < defs.length - 1) html += `<div class="step-line${done ? ' done' : ''}"></div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

// ── Urgência ──────────────────────────────────────────────────────────────────

function getUrgency(dateStr, isPosted) {
  if (!dateStr) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');
  const diff = Math.floor((d - today) / 86400000);
  if (diff < 0 && !isPosted) return 'overdue';
  if (diff === 0) return 'today';
  if (diff === 1) return 'tomorrow';
  if (diff <= 7)  return 'week';
  return '';
}

function urgBadgeHtml(urg) {
  if (!urg) return '';
  if (urg === 'overdue')  return `<span class="urg-badge urg-overdue">atrasado</span>`;
  if (urg === 'today')    return `<span class="urg-badge urg-today">hoje</span>`;
  if (urg === 'tomorrow') return `<span class="urg-badge urg-tomorrow">amanhã</span>`;
  if (urg === 'week')     return `<span class="urg-badge urg-week">esta semana</span>`;
  return '';
}

function saveInlinePost(colId) {

  const id = 'dyn-' + Date.now();
  if (!Array.isArray(state._dynamic_posts)) state._dynamic_posts = [];
  state._dynamic_posts.push({ id, type, label: TYPE_LABELS_MAP[type], title, date });
  getItem(id);

  toggleInlineAdd(colId);
  renderKanban();
  renderPlan();
  renderHistory();
  updateFormatChips();
  scheduleSave();
}

function makeKanbanCard(id, type, label, defaultTitle, date) {
  const item = getItem(id);
  if (item.is_posted) return null;

  const noDate = item._no_date && !item.post_date;
  const effectiveDate = item.post_date || (noDate ? null : date);
  if (!noDate && !effectiveDate) return null;

  if (!noDate) {
    const d2 = new Date(effectiveDate + 'T00:00:00');
    if (d2.getMonth() + 1 !== activeMonth) return null;
  }

  const effectiveType  = item.post_type || type;
  const effectiveLabel = TYPE_LABEL[effectiveType] || label;
  type  = effectiveType;
  label = effectiveLabel;

  const col = getColuna5(id, type);
  if (!col) return null;

  const title  = getEffectiveTitle(id, defaultTitle);
  const urg    = effectiveDate ? getUrgency(effectiveDate, item.is_posted) : null;
  const urgCls = urg === 'overdue'   ? ' urg-overdue'
               : urg === 'today'    ? ' urg-today'
               : urg === 'tomorrow' ? ' urg-tomorrow'
               : urg === 'week'     ? ' urg-week' : '';
  let dateStr;
  if (effectiveDate) {
    const deff = new Date(effectiveDate + 'T00:00:00');
    dateStr = `${DOW_SHORT[deff.getDay()]}, ${deff.getDate()} ${MON_NAMES[deff.getMonth()]}`;
  } else {
    dateStr = 'Sem data definida';
  }

  const nextLabel = getNextColLabel(col);
  const advanceTxt  = col === 'programado' ? '✓ Marcar como postado' : `▶ ${nextLabel}`;
  const advanceCls  = col === 'programado' ? 'k-advance-btn k-advance-post' : 'k-advance-btn';

  const safeDefault = defaultTitle.replace(/'/g, "\\'").replace(/"/g, '&quot;');
  const safeTitle   = title.replace(/'/g, "\\'").replace(/"/g, '&quot;');

  const card = document.createElement('div');
  card.className = `k-card k-col-${col}${urgCls}`;
  card.dataset.cardId = id;
  card.style.position = 'relative';
  card.innerHTML = `
    <button class="k-delete-btn" title="Excluir" onclick="event.stopPropagation();deleteCard('${id}')">
      <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg>
    </button>
    <div class="k-card-top">
      <span class="k-type-lbl">${label}</span>
      ${urgBadgeHtml(urg)}
    </div>
    <div class="k-card-title" id="k-title-${id}"
         onclick="startTitleEdit(event,'${id}','${safeDefault}')"
         title="Clique para editar">${title}</div>
    <div class="k-card-date">
      ${dateStr}
      <button class="edit-date-btn" title="Editar data"
              onclick="event.stopPropagation();openCardDatePicker('${id}','${effectiveDate||''}')">${PENCIL_SVG}</button>
    </div>
    <button class="${advanceCls}"
            onclick="event.stopPropagation();advanceCard('${id}','${type}','${safeDefault}')">
      ${advanceTxt}
    </button>
    ${col !== 'criacao' ? `<button class="k-back-btn" onclick="event.stopPropagation();regressCard('${id}','${type}')">← Voltar</button>` : ''}`;
  card.addEventListener('click', () => openPanelById(id, label, title, type));
  return { card, col };
}

function renderKanban() {
  const bodies = {};
  const counts = {};
  KANBAN_COLS.forEach(c => {
    bodies[c.id] = document.getElementById('body-' + c.id);
    counts[c.id] = document.getElementById('cnt-'  + c.id);
    if (bodies[c.id]) bodies[c.id].innerHTML = '';
  });
  const colCounts = {};
  KANBAN_COLS.forEach(c => { colCounts[c.id] = 0; });

  // Coletar todos os cards com data para ordenar depois
  const colCards = {};
  KANBAN_COLS.forEach(c => { colCards[c.id] = []; });

  const collectCard = (id, type, label, title, date) => {
    const result = makeKanbanCard(id, type, label, title, date);
    if (!result || !colCards[result.col]) return;
    const effectiveDate = getItem(id).post_date || date;
    colCards[result.col].push({ card: result.card, date: effectiveDate || '0000-00-00' });
  };

  PLAN_ITEMS.forEach(p => collectCard(p.id, p.type, p.label, p.title, p.date));
  getDynamicPosts().forEach(p => {
    const effectiveDate = getItem(p.id).post_date || p.date;
    collectCard(p.id, p.type, p.label, p.title, effectiveDate);
  });

  // Ordenar decrescente por data e inserir no DOM
  KANBAN_COLS.forEach(c => {
    colCards[c.id]
      .sort((a, b) => a.date.localeCompare(b.date))
      .forEach(({ card }) => { bodies[c.id].appendChild(card); colCounts[c.id]++; });
    if (counts[c.id]) counts[c.id].textContent = colCounts[c.id];
  });
}

// ── Histórico ─────────────────────────────────────────────────────────────────

function renderHistory() {
  const container = document.getElementById('historyContainer');
  if (!container) return;

  const monthLabel = MONTHS.find(m => m.num === activeMonth)?.label || '';
  const allItems = getAllPosts();

  const posted = allItems.filter(it => {
    const item = getItem(it.id);
    if (!item.is_posted) return false;
    const d = new Date(it.date + 'T00:00:00');
    return d.getMonth() + 1 === activeMonth;
  }).sort((a, b) => new Date(a.date) - new Date(b.date));

  const TYPE_LABELS = { reel:'Reels', carrossel:'Carrosseis', estatico:'Estáticos', storie:'Stories' };
  const typeCounts = {};
  posted.forEach(it => {
    const eff = getItem(it.id).post_type || it.type;
    typeCounts[eff] = (typeCounts[eff] || 0) + 1;
  });
  const pillsHtml = Object.entries(typeCounts)
    .map(([k, n]) => `<span class="hist-pill">${n} ${TYPE_LABELS[k] || k}</span>`).join('');

  const n = posted.length;
  const countLabel = n === 0 ? 'nenhum post publicado'
    : `${n} post${n !== 1 ? 's' : ''} publicado${n !== 1 ? 's' : ''}`;

  const itemsHtml = posted.length === 0
    ? `<p class="hist-empty">Nenhum post publicado ainda em ${monthLabel}.</p>`
    : posted.map(it => {
        const item = getItem(it.id);
        const title = getEffectiveTitle(it.id, it.title);
        const d = new Date(it.date + 'T00:00:00');
        const dateStr = `${d.getDate()} ${MON_NAMES[d.getMonth()]}`;
        const driveHtml = item.drive_link
          ? `<a href="${driveToView(item.drive_link)}" target="_blank" rel="noopener" class="hist-drive">Drive →</a>` : '';
        const effLabel = TYPE_LABEL[item.post_type || it.type] || it.label;
        return `<div class="hist-item">
          <span class="hist-check">✓</span>
          <div class="hist-content">
            <span class="hist-meta">${dateStr} · ${effLabel}</span>
            <span class="hist-title">${title}</span>
          </div>${driveHtml}</div>`;
      }).join('');

  container.innerHTML = `
    <div class="history-card">
      <div class="history-header">
        <div class="history-title-row">
          <span class="history-month">${monthLabel} 2026</span>
          <span class="history-count">${countLabel}</span>
        </div>
        ${pillsHtml ? `<div class="history-pills">${pillsHtml}</div>` : ''}
      </div>
      <div class="history-items">${itemsHtml}</div>
    </div>`;
}

// ── Calendário ────────────────────────────────────────────────────────────────

function buildCalendar(year, month) {
  // Usa UTC puro para evitar erros de fuso horário no dia da semana
  const nowLocal = new Date();
  const todayMs  = Date.UTC(nowLocal.getFullYear(), nowLocal.getMonth(), nowLocal.getDate());

  // Indexa posts pelo dia do mês
  const postsByDay = {};
  getAllPosts().forEach(post => {
    const [py, pm, pd] = post.date.split('-').map(Number);
    if (py !== year || pm !== month) return;
    if (!postsByDay[pd]) postsByDay[pd] = [];
    postsByDay[pd].push(post);
  });

  // Dia da semana do 1º do mês (UTC) — 0=Dom, 1=Seg…
  const firstMs  = Date.UTC(year, month - 1, 1);
  const dowFirst = new Date(firstMs).getUTCDay();          // 0=Dom
  const offset   = dowFirst === 0 ? 6 : dowFirst - 1;      // passos até segunda-feira
  const gridMs   = firstMs - offset * 86400000;            // ms da segunda-feira inicial

  // Último dia do mês
  const daysInMonth = new Date(Date.UTC(year, month, 0)).getUTCDate();
  const lastMs      = Date.UTC(year, month - 1, daysInMonth);

  // Monta semanas
  const rows = [];
  let weekMs  = gridMs;
  let weekNum = 0;
  while (weekMs <= lastMs + 6 * 86400000) {
    const days = Array.from({ length: 7 }, (_, i) => weekMs + i * 86400000);
    const hasMonthDay = days.some(ms => {
      const d = new Date(ms); return d.getUTCMonth() + 1 === month && d.getUTCFullYear() === year;
    });
    if (hasMonthDay) { weekNum++; rows.push({ weekNum, days }); }
    else if (rows.length > 0) break;
    weekMs += 7 * 86400000;
  }

  const dayNames = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  let html = '<div class="cal-wrapper"><div class="cal-grid">';
  html += '<div class="cal-head-row"><div class="cal-head-corner"></div>';
  dayNames.forEach(n => { html += `<div class="cal-head-cell">${n}</div>`; });
  html += '</div>';

  rows.forEach(({ weekNum: wn, days }) => {
    html += '<div class="cal-row">';
    html += `<div class="cal-week-label">Sem ${wn}</div>`;
    days.forEach(ms => {
      const d       = new Date(ms);
      const dy      = d.getUTCFullYear();
      const dm      = d.getUTCMonth() + 1;
      const dayNum  = d.getUTCDate();
      const inMonth = dy === year && dm === month;
      const isToday = ms === todayMs;
      const posts   = inMonth ? (postsByDay[dayNum] || []) : [];
      const hasPosts = posts.length > 0;
      const dateStr = `${dy}-${String(dm).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;

      let cellCls = 'cal-cell';
      if (inMonth) cellCls += ' in-month';
      if (inMonth && hasPosts) cellCls += ' has-posts';
      if (isToday) cellCls += ' today-cell';

      const clickAttr = inMonth && !hasPosts ? `onclick="openCreateModal('${dateStr}')"` : '';
      html += `<div class="${cellCls}" ${clickAttr}>`;
      if (inMonth) {
        html += `<div class="cal-cell-day">${dayNum}</div>`;
        if (!hasPosts) {
          html += `<div class="cal-plus">+</div>`;
        } else {
          posts.forEach(post => {
            const item   = getItem(post.id);
            const postDate = item.post_date || post.date;
            const urg    = getUrgency(postDate, item.is_posted);
            const title  = getEffectiveTitle(post.id, post.title);
            let chipSt = 'status-pending';
            if (item.is_posted) chipSt = 'status-posted';
            else if (urg === 'overdue') chipSt = 'status-overdue';
            else if (urg === 'today' || urg === 'tomorrow') chipSt = 'status-urgent';
            else if (urg === 'week') chipSt = 'status-week';
            const effectivePostType = item.post_type || post.type;
            const typeLabel = TYPE_LABEL[effectivePostType] || post.label;
            const safeTitle = title.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            const safeLabel = typeLabel.replace(/'/g, '&#39;');
            html += `<div class="cal-chip ${chipSt}" onclick="event.stopPropagation();openPanelById('${post.id}','${safeLabel}','${safeTitle}','${effectivePostType}')">`;
            html += `<span class="cal-chip-type">${typeLabel}</span>`;
            html += `<span class="cal-chip-title">${title}</span>`;
            html += `</div>`;
          });
        }
      }
      html += '</div>';
    });
    html += '</div>';
  });
  html += '</div></div>';
  return html;
}

function renderPlan() {
  const container = document.getElementById('plan-content');
  if (!container) return;
  const monthLabel = MONTHS.find(m => m.num === activeMonth)?.label || 'este mês';
  const allForMonth = getAllPosts().filter(p => {
    const d = new Date(p.date + 'T00:00:00');
    return d.getMonth() + 1 === activeMonth;
  });
  if (allForMonth.length === 0) {
    container.innerHTML = `<p class="plan-empty">Nenhum post planejado para ${monthLabel}.</p>`;
    updateFormatChips();
    return;
  }
  container.innerHTML = buildCalendar(2026, activeMonth);
  updateFormatChips();
}

// ── Drive helpers ─────────────────────────────────────────────────────────────

function driveToEmbed(url) {
  if (!url) return '';
  const m = url.match(/\/file\/d\/([^/]+)/);
  return m ? `https://drive.google.com/file/d/${m[1]}/preview` : '';
}

function driveToView(url) {
  if (!url) return '';
  const m = url.match(/\/file\/d\/([^/]+)/);
  return m ? `https://drive.google.com/file/d/${m[1]}/view` : url;
}

function openPanelById(id, eyebrow, defaultTitle, type) {
  activeId = id;
  const item  = getItem(id);
  const title = getEffectiveTitle(id, defaultTitle);
  const effectiveType = item.post_type || type;

  document.getElementById('modalTitle').textContent   = title;
  document.getElementById('modalEyebrow').textContent = TYPE_LABEL[effectiveType] || eyebrow;

  const modalSteps = document.getElementById('modalSteps');
  modalSteps.dataset.stepsId = id;
  modalSteps.dataset.type    = effectiveType;
  renderStepsBar(modalSteps);

  document.getElementById('driveInput').value   = item.drive_link || '';
  renderDrivePreview(item.drive_link || '');
  document.getElementById('legendaInput').value = item.legenda || '';

  const descricaoInput = document.getElementById('descricaoInput');
  const descricaoBtn   = document.getElementById('descricaoToggleBtn');
  descricaoInput.value = item.descricao || '';
  const hasDescricao = !!(item.descricao && item.descricao.trim());
  descricaoInput.style.display = hasDescricao ? 'block' : 'none';
  descricaoBtn.textContent     = hasDescricao ? '−' : '+';

  document.querySelectorAll('#formatSelector .fmt-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.type === effectiveType);
  });

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePanel() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  activeId = null;
}

function changePostType(newType) {
  if (!activeId) return;
  const item = getItem(activeId);
  item.post_type = newType;

  document.getElementById('modalEyebrow').textContent = TYPE_LABEL[newType] || newType;
  document.querySelectorAll('#formatSelector .fmt-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.type === newType);

  const modalSteps = document.getElementById('modalSteps');
  modalSteps.dataset.type = newType;

  renderPlan();
  scheduleSave();

function toggleDescricao() {
  const textarea = document.getElementById('descricaoInput');
  const btn      = document.getElementById('descricaoToggleBtn');
  const isOpen   = textarea.style.display !== 'none';
  textarea.style.display = isOpen ? 'none' : 'block';
  btn.textContent        = isOpen ? '+' : '−';
  if (!isOpen) setTimeout(() => textarea.focus(), 50);
}

function onDescricaoBlur() {
  if (!activeId) return;
  const val = document.getElementById('descricaoInput').value.trim();
  getItem(activeId).descricao = val;
  scheduleSave();
}

function renderDrivePreview(url) {
  const preview = document.getElementById('drivePreview');
  const linkEl  = document.getElementById('driveLink');
  const trimmed = url.trim();
  if (trimmed.startsWith('http')) { linkEl.href = driveToView(trimmed); linkEl.style.display = 'inline'; }
  else { linkEl.style.display = 'none'; }
  const embedUrl = driveToEmbed(trimmed);
  preview.innerHTML = embedUrl ? `<iframe src="${embedUrl}" allowfullscreen></iframe>` : '';
}

function onDriveInput() {
  if (!activeId) return;
  const url = document.getElementById('driveInput').value.trim();
  getItem(activeId).drive_link = url;
  renderDrivePreview(url);
  scheduleSave();
}

function onLegendaInput() {

  getItem(activeId).legenda = document.getElementById('legendaInput').value;
  scheduleSave();
}

function copyLegenda() {
  const text = document.getElementById('legendaInput').value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btnCopy');
    btn.textContent = 'Copiado ✓'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar legenda'; btn.classList.remove('copied'); }, 1800);

// ── Banco de Ideias ───────────────────────────────────────────────────────────

const IDEIAS_TABLE = 'ideias';
let ideiasData = [];
let activeIdeiaFilter = 'todas';
let transformarIdeiaId = null;

const IDEIAS_URL = () => `${SUPABASE_URL}/rest/v1/${IDEIAS_TABLE}`;
const IDEIAS_HEADERS = {
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Content-Type': 'application/json',
};

async function loadIdeias() {
  try {
    const res = await fetch(IDEIAS_URL() + '?order=criado_em.desc', { headers: IDEIAS_HEADERS });
    if (res.ok) ideiasData = await res.json();
  } catch(e) {}
  renderIdeiasGrid();
}

async function salvarNovaIdeiaAPI(ideia) {
  const res = await fetch(IDEIAS_URL(), {
    method: 'POST',
    headers: { ...IDEIAS_HEADERS, 'Prefer': 'return=representation' },
    body: JSON.stringify(ideia),
  });
  if (!res.ok) throw new Error('Erro ao salvar ideia');
  const data = await res.json();
  return Array.isArray(data) ? data[0] : data;
}

async function deletarIdeiaAPI(id) {
  await fetch(IDEIAS_URL() + `?id=eq.${id}`, {
    method: 'DELETE',
    headers: IDEIAS_HEADERS,
  });
}

function showIdeiasView() {
  document.getElementById('dashboardView').classList.add('hidden');
  document.getElementById('ideiasView').classList.add('visible');
  document.getElementById('ideiasNavBtn').classList.add('active');
  document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
  loadIdeias();
}


function setIdeiaFilter(fmt) {
  activeIdeiaFilter = fmt;
  document.querySelectorAll('.ideia-filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.fmt === fmt);
  });
  renderIdeiasGrid();
}

function renderIdeiasGrid() {
  const grid = document.getElementById('ideiasGrid');
  if (!grid) return;
  const filtered = activeIdeiaFilter === 'todas'
    ? ideiasData
    : ideiasData.filter(i => i.formato === activeIdeiaFilter);

  if (filtered.length === 0) {
    grid.innerHTML = '<p class="ideias-empty">Nenhuma ideia por aqui ainda.</p>';
    return;
  }

  const FMT_LABEL = { reel:'Reel', carrossel:'Carrossel', estatico:'Post Estático', storie:'Storie' };
  grid.innerHTML = filtered.map(ideia => {
    const d = new Date(ideia.criado_em);
    const dateStr = `${d.getDate()} ${MON_NAMES[d.getMonth()]}`;
    const descHtml = ideia.descricao
      ? `<p class="ideia-descricao">${ideia.descricao.replace(/</g,'&lt;')}</p>` : '';
    return `
    <div class="ideia-card" data-ideia-id="${ideia.id}">
      <div class="ideia-card-top">
        <span class="ideia-format-badge fmt-${ideia.formato}">${FMT_LABEL[ideia.formato] || ideia.formato}</span>
        <span class="ideia-date">${dateStr}</span>
      </div>
      <p class="ideia-titulo">${ideia.titulo.replace(/</g,'&lt;')}</p>
      ${descHtml}
      <div class="ideia-card-actions">
        <button class="btn-transformar" onclick="openTransformarModal('${ideia.id}')">▶ Transformar em post</button>
        <button class="btn-apagar-ideia" onclick="apagarIdeia('${ideia.id}')">Apagar</button>
      </div>
    </div>`;
  }).join('');
}

function openNovaIdeiaModal() {
  document.getElementById('ideiaTitle').value = '';
  document.getElementById('ideiaFormato').value = 'reel';
  document.getElementById('ideiaDescricao').value = '';
  document.getElementById('novaIdeiaOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('ideiaTitle').focus(), 260);
}

function closeNovaIdeiaModal() {
  document.getElementById('novaIdeiaOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

async function salvarIdeia() {
  const titulo = document.getElementById('ideiaTitle').value.trim();
  if (!titulo) { document.getElementById('ideiaTitle').focus(); return; }
  const formato = document.getElementById('ideiaFormato').value;
  const descricao = document.getElementById('ideiaDescricao').value.trim() || null;
  try {
    const nova = await salvarNovaIdeiaAPI({ titulo, formato, descricao });
    ideiasData.unshift(nova);
    closeNovaIdeiaModal();
    renderIdeiasGrid();
  } catch(e) {
    alert('Erro ao salvar ideia. Tente novamente.');
  }
}

async function apagarIdeia(id) {
  if (!confirm('Apagar esta ideia?')) return;
  await deletarIdeiaAPI(id);
  ideiasData = ideiasData.filter(i => i.id !== id);
  renderIdeiasGrid();
}

function openTransformarModal(ideiaId) {
  transformarIdeiaId = ideiaId;
  const ideia = ideiasData.find(i => i.id === ideiaId);
  if (!ideia) return;
  const FMT_LABEL = { reel:'Reel', carrossel:'Carrossel', estatico:'Post Estático', storie:'Storie' };
  document.getElementById('transformarEyebrow').textContent = FMT_LABEL[ideia.formato] || ideia.formato;
  document.getElementById('transformarTitle').textContent = ideia.titulo;
  document.getElementById('transformarDate').value = '';
  document.getElementById('transformarOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeTransformarModal() {
  document.getElementById('transformarOverlay').classList.remove('open');
  document.body.style.overflow = '';
  transformarIdeiaId = null;
}

async function confirmarTransformar() {
  const date = document.getElementById('transformarDate').value;
  await _transformarEmPost(date || null);
}

async function confirmarTransformarSemData() {
  await _transformarEmPost(null);
}

async function _transformarEmPost(date) {
  const ideia = ideiasData.find(i => i.id === transformarIdeiaId);
  if (!ideia) return;

  const TYPE_LABELS_MAP = { reel:'Reel', carrossel:'Carrossel', estatico:'Post Estático', storie:'Storie' };
  const dynId = 'dyn-' + Date.now();
  if (!Array.isArray(state._dynamic_posts)) state._dynamic_posts = [];
  state._dynamic_posts.push({
    id: dynId,
    type: ideia.formato,
    label: TYPE_LABELS_MAP[ideia.formato],
    title: ideia.titulo,
    date: date || '2099-12-31',
  });
  const item = getItem(dynId);
  if (date) item.post_date = date;
  else { item.post_date = null; item._no_date = true; }

  await deletarIdeiaAPI(transformarIdeiaId);
  ideiasData = ideiasData.filter(i => i.id !== transformarIdeiaId);

  closeTransformarModal();
  hideIdeiasView();

  const monthBtn = document.querySelector(`.month-btn[data-month="${activeMonth}"]`);
  if (monthBtn) monthBtn.classList.add('active');

  renderKanban(); renderPlan(); renderHistory(); updateFormatChips();
  scheduleSave();
}

// ── Realtime ──────────────────────────────────────────────────────────────────

function connectRealtime() {
  const ws = new WebSocket(
    `wss://omnvnxxvyasdikuoxsrf.supabase.co/realtime/v1/websocket?apikey=${SUPABASE_KEY}&vsn=1.0.0`
  );
  ws.onopen = () => {
    ws.send(JSON.stringify({ topic:'realtime:public:dashboard', event:'phx_join', payload:{}, ref:'1' }));
  };
  ws.onmessage = async (e) => {
    const msg = JSON.parse(e.data);
    if (msg.event === 'postgres_changes' || (msg.payload && msg.payload.type === 'UPDATE')) {
      const remote = await api('GET');
      if (JSON.stringify(remote) !== JSON.stringify(state)) { state = remote; migrate(); applyAll(); }
    }
  };
  ws.onclose = () => setTimeout(connectRealtime, 5000);
}

// ── Init ──────────────────────────────────────────────────────────────────────

initKanbanCols();
loadState().then(() => {
  initPlanCollapse();
  connectRealtime();
  setInterval(async () => {
    if (saving) return;
    try {
      const remote = await api('GET');
      if (JSON.stringify(remote) !== JSON.stringify(state)) { state = remote; migrate(); applyAll(); }
    } catch(e) {}
  }, 20000);
});
